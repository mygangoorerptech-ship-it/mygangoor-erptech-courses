<!-- API Base URL Configuration -->
<script>
// Determine API base URL based on environment
(function() {
    // Try to get from meta tag (can be injected during build)
    const apiMeta = document.querySelector('meta[name="api-base-url"]');
    const apiBaseFromMeta = apiMeta ? apiMeta.getAttribute('content') : null;
    
    // If meta tag exists, use it; otherwise default to same-origin
    if (apiBaseFromMeta) {
        window.API_BASE_URL = apiBaseFromMeta;
    } else {
        window.API_BASE_URL = '/api';
    }
    
    console.log('[Login Page] API Base URL:', window.API_BASE_URL);
})();
</script>

<script>
// CSRF Token handling
let csrfToken = null;

async function getCsrfToken() {
    if (csrfToken) return csrfToken;
    
    try {
        const apiBase = window.API_BASE_URL || '/api';
        const response = await fetch(`${apiBase.replace('/api', '')}/csrf`, {
            method: 'GET',
            credentials: 'include'
        });
        const data = await response.json();
        csrfToken = data.token;
        return csrfToken;
    } catch (error) {
        console.error('Error getting CSRF token:', error);
        return null;
    }
}

// Route for role
function routeForRole(role) {
    if (role === "superadmin") return "/superadmin";
    if (role === "admin") return "/admin";
    if (role && role.startsWith("org")) return "/dashboard";
    if (role === "vendor") return "/vendor";
    if (role === "student") return "/dashboard";
    return "/home";
}

// Form validation
function validateForm() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;
    
    // Clear previous errors
    document.getElementById('emailError').classList.remove('show');
    document.getElementById('passwordError').classList.remove('show');
    document.getElementById('emailError').textContent = '';
    document.getElementById('passwordError').textContent = '';
    
    // Validate email
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address.';
        document.getElementById('emailError').classList.add('show');
        valid = false;
    }
    
    // Validate password
    if (password.length < 6) {
        document.getElementById('passwordError').textContent = 'Password must be at least 6 characters.';
        document.getElementById('passwordError').classList.add('show');
        valid = false;
    }
    
    return valid;
}

// Handle login form submission
async function handleLogin(event) {
    event.preventDefault();
    
    if (!validateForm()) {
        return;
    }
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    const apiBase = window.API_BASE_URL || '/api';
    
    // Disable button and show loading state
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';
    
    try {
        // Get CSRF token
        const csrf = await getCsrfToken();
        if (!csrf) {
            throw new Error('Failed to get CSRF token');
        }
        
        // Make login request
        const response = await fetch(`${apiBase}/auth/login`, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': csrf
            },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data?.mfa?.required && data?.mfaTempToken) {
            // Redirect to MFA page
            const base = routeForRole(data.user?.role);
            window.location.href = `/mfa?from=${encodeURIComponent(base)}&mfaTempToken=${data.mfaTempToken}`;
            return;
        }
        
        if (data?.ok && data?.user) {
            // Login successful - redirect based on role
            const base = routeForRole(data.user?.role);
            
            // Check if there's a pending join modal flag
            const pendingJoinModal = sessionStorage.getItem('pendingJoinModal');
            if (pendingJoinModal === 'true') {
                sessionStorage.removeItem('pendingJoinModal');
                window.location.href = '/tracks?openJoinModal=true';
            } else {
                window.location.href = base;
            }
        } else {
            // Login failed
            alert(data?.message || 'Sign-in failed. Please check your credentials.');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign In';
        }
    } catch (error) {
        console.error('Login error:', error);
        alert(error?.response?.data?.message || 'Sign-in failed. Please try again.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
    }
}

// Check if user is already logged in
async function checkAuthStatus() {
    try {
        const apiBase = window.API_BASE_URL || '/api';
        const response = await fetch(`${apiBase}/auth/check`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        const data = await response.json();
        if (data?.ok && data?.user) {
            // User is already logged in - redirect to appropriate dashboard
            const base = routeForRole(data.user?.role);
            window.location.href = base;
        }
    } catch (error) {
        console.error('Error checking auth status:', error);
        // Continue to show login page
    }
}

// Check auth status on page load
window.addEventListener('DOMContentLoaded', checkAuthStatus);
</script>
